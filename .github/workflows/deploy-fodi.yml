name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_SLUG: fodi-os
  PROJECT_PATH: /var/www/projects/fodi-os

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 15m
          envs: PROJECT_PATH
          script: |
            cd $PROJECT_PATH
            git pull origin main

            # Tag current image for rollback
            docker tag fodi-os-app:latest fodi-os-app:previous 2>/dev/null || true

            docker compose build --no-cache app
            docker compose up -d app
            echo "Waiting for container to be healthy..."
            for i in $(seq 1 30); do
              CONTAINER_NAME=$(docker compose ps -q app 2>/dev/null)
              if [ -n "$CONTAINER_NAME" ] && docker exec "$CONTAINER_NAME" wget -q --spider http://127.0.0.1:3000/api/health 2>/dev/null; then
                echo "Health check passed"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: Container is not healthy after 150s"
                docker compose logs --tail=50 app
                # Attempt rollback
                if docker image inspect fodi-os-app:previous > /dev/null 2>&1; then
                  echo "Rolling back to previous image..."
                  docker tag fodi-os-app:previous fodi-os-app:latest
                  docker compose up -d app
                fi
                exit 1
              fi
              sleep 5
            done

            # Docker cleanup - remove old images and build cache
            echo "Cleaning up old Docker resources..."
            docker image prune -f 2>/dev/null || true
            docker builder prune -f --filter "until=24h" 2>/dev/null || true

      - name: Notify deployment
        if: always()
        run: |
          curl -s -X POST "https://n8n.fodivps2.cloud/webhook/deploy-notify" \
            -H "Content-Type: application/json" \
            -d "{\"project\": \"${{ env.PROJECT_SLUG }}\", \"status\": \"${{ job.status }}\", \"commit\": \"${{ github.sha }}\", \"actor\": \"${{ github.actor }}\"}" \
            || echo "Notification webhook failed (non-critical)"
